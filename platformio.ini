; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:disco_f407vg]
platform = ststm32
board = disco_f407vg
framework = stm32cube
extra_scripts = pre:scripts/pio_hardfloat.py
build_flags = -std=c++17
	-std=gnu++17
	-mfpu=fpv4-sp-d16
	-mfloat-abi=hard
	-DTF_LITE_STATIC_MEMORY
	-Itflite-micro/
	-Itflite-micro/tensorflow/lite/micro/tools/make/downloads/flatbuffers/include/
	-Itflite-micro/tensorflow/lite/micro/tools/make/downloads/gemmlowp/
	-Llib/static_lib/
	-ltensorflow-microlite
build_unflags = 
	-std=gnu++11